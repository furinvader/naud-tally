<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Focused room-first order entry stepper</title>
  <desc id="desc">A tablet layout for Naud Tally with a host app bar, a three-step room-guest-drinks header, one visible guest-selection panel, and a no-rooms empty-state variant.</desc>
  <defs>
    <style>
      .canvas { fill: #F4F2EE; }
      .surface { fill: #FBFAF8; stroke: #D7D0C7; stroke-width: 1; }
      .surface-soft { fill: #F1ECE5; stroke: #D7D0C7; stroke-width: 1; }
      .action { fill: #355061; }
      .action-soft { fill: #E6EDF1; stroke: #355061; stroke-width: 1; }
      .accent-soft { fill: #E7ECE5; stroke: #B8B0A6; stroke-width: 1; }
      .ink { fill: #1E2630; font-family: "Inter Tight", sans-serif; }
      .muted { fill: #67717A; font-family: "Inter Tight", sans-serif; }
      .label { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
      .title { font-size: 32px; font-weight: 700; }
      .section { font-size: 24px; font-weight: 700; }
      .body { font-size: 18px; font-weight: 500; }
      .number { font-family: "Manrope", sans-serif; font-size: 34px; font-weight: 700; }
      .button-text { fill: #FBFAF8; font-size: 18px; font-weight: 700; font-family: "Inter Tight", sans-serif; }
      .card-title { font-size: 20px; font-weight: 700; }
      .small { font-size: 16px; font-weight: 500; }
    </style>
    <filter id="panelShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0A141E" flood-opacity="0.09"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0A141E" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect class="canvas" x="0" y="0" width="1440" height="1024" />

  <rect class="surface" x="40" y="32" width="1360" height="80" rx="16" filter="url(#panelShadow)" />
  <text class="ink label" x="80" y="66">Host order entry</text>
  <text class="ink title" x="80" y="95">Naud Tally</text>
  <rect class="action" x="1210" y="48" width="150" height="48" rx="10" />
  <text class="button-text" x="1250" y="79">Host tools</text>

  <rect class="accent-soft" x="40" y="144" width="420" height="108" rx="16" filter="url(#panelShadow)" />
  <text class="muted label" x="72" y="178">Step 1</text>
  <text class="ink section" x="72" y="212">Room</text>
  <text class="muted body" x="72" y="238">Room 101</text>

  <rect class="action-soft" x="480" y="144" width="420" height="108" rx="16" filter="url(#panelShadow)" />
  <text class="muted label" x="512" y="178">Step 2</text>
  <text class="ink section" x="512" y="212">Guest</text>
  <text class="muted body" x="512" y="238">Ada Lovelace</text>

  <rect class="surface-soft" x="920" y="144" width="480" height="108" rx="16" filter="url(#panelShadow)" />
  <text class="muted label" x="952" y="178">Step 3</text>
  <text class="ink section" x="952" y="212">Drinks</text>
  <text class="muted body" x="952" y="238">Running total €6.50</text>

  <rect class="surface" x="40" y="284" width="1360" height="700" rx="16" filter="url(#panelShadow)" />
  <text class="muted label" x="76" y="324">Step 2</text>
  <text class="ink section" x="76" y="360">Choose a guest</text>
  <text class="muted body" x="76" y="390">Room 101</text>
  <rect class="action" x="1228" y="312" width="124" height="44" rx="10" />
  <text class="button-text" x="1260" y="340">Add guest</text>

  <rect class="accent-soft" x="76" y="432" width="300" height="156" rx="14" filter="url(#cardShadow)" />
  <text class="muted label" x="108" y="468">Guest</text>
  <text class="ink card-title" x="108" y="504">Ada Lovelace</text>
  <text class="muted body" x="108" y="536">2 drinks recorded</text>
  <text class="ink number" x="108" y="574">€6.50</text>

  <rect class="surface-soft" x="396" y="432" width="300" height="156" rx="14" filter="url(#cardShadow)" />
  <text class="muted label" x="428" y="468">Guest</text>
  <text class="ink card-title" x="428" y="504">Grace Hopper</text>
  <text class="muted body" x="428" y="536">No drinks yet</text>
  <text class="ink number" x="428" y="574">€0.00</text>

  <rect class="surface-soft" x="716" y="432" width="300" height="220" rx="14" filter="url(#cardShadow)" />
  <text class="muted label" x="748" y="468">New guest</text>
  <text class="ink body" x="748" y="506">Full name</text>
  <rect class="surface" x="748" y="526" width="236" height="42" rx="8" />
  <text class="muted small" x="764" y="553">Enter guest name</text>
  <rect class="action" x="748" y="590" width="112" height="44" rx="10" />
  <text class="button-text" x="778" y="618">Open tab</text>
  <rect class="surface" x="872" y="590" width="112" height="44" rx="10" />
  <text class="ink small" x="907" y="618">Cancel</text>

  <rect class="surface-soft" x="1036" y="432" width="316" height="220" rx="14" filter="url(#cardShadow)" />
  <text class="muted label" x="1068" y="468">Header behavior</text>
  <text class="ink body" x="1068" y="506">Tap Room or Guest to correct a miss-tap.</text>
  <text class="ink body" x="1068" y="542">Keep recorded drinks on the original tab</text>
  <text class="ink body" x="1068" y="578">until a new room or guest is chosen.</text>

  <rect class="surface-soft" x="76" y="684" width="1276" height="236" rx="14" filter="url(#cardShadow)" />
  <text class="muted label" x="108" y="724">Empty state variant</text>
  <text class="ink section" x="108" y="764">No rooms configured yet</text>
  <text class="muted body" x="108" y="798">Show this instead of the stepper when the host has not configured the fixed room list.</text>
  <rect class="action" x="108" y="826" width="190" height="52" rx="10" />
  <text class="button-text" x="144" y="859">Open host tools</text>
</svg>
