name: Repo Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          required_files=(
            AGENTS.md
            PLANS.md
            agent-index.md
            README.md
            LICENSE
            CONTRIBUTING.md
            docs/agent-index.md
            docs/product.md
            docs/architecture.md
            docs/glossary.md
            docs/agentic-workflow.md
            docs/decisions.md
            docs/tasks.md
            docs/tasks/agent-index.md
            docs/tasks/open/agent-index.md
            docs/tasks/done/agent-index.md
            docs/workflows/agent-index.md
            docs/workflows/publish.md
            docs/github-setup.md
            frontend/README.md
            frontend/agent-index.md
            frontend/decisions.md
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Verify markdown files are non-empty
        run: |
          while IFS= read -r file; do
            if [ ! -s "$file" ]; then
              echo "Empty markdown file: $file"
              exit 1
            fi
          done < <(git ls-files | grep -E '\.md$' | sort)

      - name: Verify markdown repo paths use markdown links
        run: python3 scripts/check-markdown-repo-links.py

      - name: Verify unique decision titles and task identifiers
        run: |
          mapfile -t decision_files < <(git ls-files | grep -E '(^|/)decisions\.md$' | sort)
          decision_dupes=""
          if [ "${#decision_files[@]}" -gt 0 ]; then
            decision_dupes="$(grep -hE '^## ' "${decision_files[@]}" | sort | uniq -d)"
          fi
          task_dupes="$(find docs/tasks -type f -name 'T-*.md' -exec grep -hE '^# T-[0-9]+' {} + | sort | uniq -d)"

          if [ -n "$decision_dupes" ]; then
            echo "Duplicate decision titles found:"
            echo "$decision_dupes"
            exit 1
          fi

          if [ -n "$task_dupes" ]; then
            echo "Duplicate task IDs found:"
            echo "$task_dupes"
            exit 1
          fi

      - name: Verify task folder matches task status
        run: |
          while IFS= read -r file; do
            folder="$(basename "$(dirname "$file")")"
            status="$(awk '
              /^## Status$/ { getline; getline; sub(/^- /, "", $0); print; exit }
            ' "$file")"

            if [ "$status" != "open" ] && [ "$status" != "done" ]; then
              echo "Unsupported task status in: $file"
              echo "Allowed statuses: open, done"
              echo "Actual status: $status"
              exit 1
            fi

            if [ "$folder" != "$status" ]; then
              echo "Task file status folder mismatch: $file"
              echo "Expected folder: $status"
              echo "Actual folder: $folder"
              exit 1
            fi
          done < <(find docs/tasks -mindepth 2 -maxdepth 2 -type f -name 'T-*.md' | sort)

      - name: Verify pull request title matches publish rules
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|test): .+$'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "Pull request title must match '<type>: <summary>'."
            echo "Allowed types: feat, fix, docs, chore, refactor, test."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

          if [[ "$PR_TITLE" =~ [[:space:]]$ ]]; then
            echo "Pull request title must not end with whitespace."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

      - name: Verify README references the core docs
        run: |
          grep -q 'docs/workflows/publish.md' README.md
          grep -q 'frontend/README.md' README.md
          grep -q 'docs/product.md' README.md
          grep -q 'docs/architecture.md' README.md
          grep -q 'docs/glossary.md' README.md
          grep -q 'docs/agentic-workflow.md' README.md
          grep -q 'docs/decisions.md' README.md
          grep -q 'docs/github-setup.md' README.md
          grep -q 'CONTRIBUTING.md' README.md

  frontend-validation:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node from frontend nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watch=false

      - name: Build frontend
        run: npm run build
