<nt-page-shell
  [maxWidth]="'var(--nt-drink-tally-shell-max-width)'"
  [background]="shellBackground"
>
  <nt-app-bar [title]="copy.title">
    <a
      actions
      mat-stroked-button
      class="toolbar-action"
      data-testid="host-route-link"
      [routerLink]="hostRoute"
    >
      Host tools
    </a>
  </nt-app-bar>

  <section class="screen-body">
    <div class="public-column" [class.public-column--entry-open]="entryOpen()">
      @if (entryOpen()) {
        <nt-add-guest-flow-card
          [flow]="addGuestFlow()"
          [copy]="copy.addGuestFlow"
          (roomNumberInput)="updateDraftRoomNumber.emit($event)"
          (fullNameInput)="updateDraftFullName.emit($event)"
          (submitRoomNumber)="submitRoomNumber.emit()"
          (submitGuestIdentity)="submitGuestIdentity.emit()"
          (back)="returnToRoomNumberStep.emit()"
          (cancel)="cancelAddGuestFlow.emit()"
        />
      }

      <nt-active-guest-list-panel
        [guests]="activeGuests()"
        [selectedGuestId]="selectedGuestId()"
        [entryOpen]="entryOpen()"
        [copy]="copy.activeGuestList"
        (startAddGuest)="startAddGuest.emit()"
        (selectGuest)="selectGuest.emit($event)"
      />
    </div>

    <nt-selected-guest-panel
      [selectedGuest]="selectedGuest()"
      [copy]="selectedGuestPanelCopy"
      (incrementDrink)="incrementDrink.emit($event)"
      (decrementDrink)="decrementDrink.emit($event)"
    />
  </section>
</nt-page-shell>
