<mat-toolbar class="app-toolbar">
  <div class="brand-block">
    <span class="brand">{{ copy.title }}</span>
  </div>

  <a
    mat-stroked-button
    class="toolbar-action"
    data-testid="host-route-link"
    [routerLink]="hostRoute"
  >
    Host tools
  </a>
</mat-toolbar>

<main class="app-shell">
  <section class="screen-body">
    <div class="public-column" [class.public-column--entry-open]="entryOpen()">
      @if (entryOpen()) {
        <nt-add-guest-flow-card
          [flow]="tallyStore.addGuestFlow()"
          [copy]="copy.addGuestFlow"
          (roomNumberInput)="tallyStore.updateDraftRoomNumber($event)"
          (fullNameInput)="tallyStore.updateDraftFullName($event)"
          (submitRoomNumber)="tallyStore.submitRoomNumber()"
          (submitGuestIdentity)="tallyStore.submitGuestIdentity()"
          (back)="tallyStore.returnToRoomNumberStep()"
          (cancel)="tallyStore.cancelAddGuestFlow()"
        />
      }

      <nt-active-guest-list-panel
        [guests]="tallyStore.activeGuests()"
        [selectedGuestId]="tallyStore.selectedGuest()?.id ?? null"
        [entryOpen]="entryOpen()"
        [copy]="copy.activeGuestList"
        (startAddGuest)="tallyStore.startAddGuestFlow()"
        (selectGuest)="tallyStore.selectGuestTab($event)"
      />
    </div>

    <nt-selected-guest-panel
      [selectedGuest]="tallyStore.selectedGuest()"
      [copy]="selectedGuestPanelCopy"
      (incrementDrink)="tallyStore.incrementDrink($event)"
      (decrementDrink)="tallyStore.decrementDrink($event)"
    />
  </section>
</main>
