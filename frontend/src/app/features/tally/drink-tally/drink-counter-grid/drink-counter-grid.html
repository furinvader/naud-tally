<section class="drink-grid" aria-label="Drink tally controls">
  @for (drink of drinks(); track drink.id) {
    <mat-card appearance="outlined" class="drink-card">
      <mat-card-header>
        <mat-card-title>{{ drink.name }}</mat-card-title>
        <mat-card-subtitle>
          {{ subtitle() }}

          @if (drink.displayPrice) {
            <span class="drink-card__price">{{ drink.displayPrice }}</span>
          }
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="count-pill">
          <span class="count-pill-label">{{ countLabel() }}</span>
          <span class="count-pill-value">{{ drink.count }}</span>
        </div>
      </mat-card-content>

      <div class="drink-actions">
        <button
          mat-stroked-button
          type="button"
          class="count-button count-button--secondary"
          [disabled]="drink.count === 0"
          [attr.aria-label]="'Remove one ' + drink.name"
          (click)="decrementDrink.emit(drink.id)"
        >
          -
        </button>

        <button
          mat-flat-button
          type="button"
          class="count-button count-button--primary"
          [attr.aria-label]="'Add one ' + drink.name"
          (click)="incrementDrink.emit(drink.id)"
        >
          +
        </button>
      </div>
    </mat-card>
  }
</section>
