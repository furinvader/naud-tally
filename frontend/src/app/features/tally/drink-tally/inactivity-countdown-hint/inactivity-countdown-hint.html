<div
  class="inactivity-hint"
  [style.--nt-timeout-progress]="progressPercent()"
  [style.--nt-timeout-ring-offset]="ringOffset()"
>
  <span
    class="inactivity-hint__fill"
    aria-hidden="true"
    data-testid="inactivity-progress-fill"
  ></span>
  <span class="inactivity-hint__copy">{{ message() }}</span>
  <svg
    class="inactivity-hint__ring"
    viewBox="0 0 40 40"
    aria-hidden="true"
    data-testid="inactivity-progress-ring"
  >
    <circle class="inactivity-hint__ring-track" cx="20" cy="20" r="16" pathLength="100" />
    <circle class="inactivity-hint__ring-progress" cx="20" cy="20" r="16" pathLength="100" />
  </svg>
</div>
