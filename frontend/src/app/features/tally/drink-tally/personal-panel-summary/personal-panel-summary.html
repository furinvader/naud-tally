<section class="personal-panel-summary">
  <div class="personal-panel-summary__item">
    <div class="personal-panel-summary__topline">
      <span class="personal-panel-summary__label">{{ primaryLabel() }}</span>
      <strong class="personal-panel-summary__value">{{ primaryValue() }}</strong>
    </div>
    <span class="personal-panel-summary__caption">{{ primaryCaption() }}</span>
  </div>

  <div class="personal-panel-summary__item">
    <div class="personal-panel-summary__topline">
      <span class="personal-panel-summary__label">{{ secondaryLabel() }}</span>
      <strong class="personal-panel-summary__value">{{ secondaryValue() }}</strong>
    </div>
    <span class="personal-panel-summary__caption">{{ secondaryCaption() }}</span>
  </div>
</section>
